  region_shapes_file: data/processed/regions/denmark_regionslevel1.geojson
  eez_file: data/raw/eez_v11.gpkg
  load_file: data/raw/load.csv
  existing_power_plants_file: data/raw/global-power-plant-database/global_power_plant_database.csv
  technology_parameters_file: data/raw/technolgy_parameters_2025.csv
