    onshore_wind: 1.0
    offshore_wind: 1.0
  renewable_potential_distribution: area
  # maximal installierbare Leistung in Dänemark gesamt
  renewable_potentials_mw:
    solar:   86190.0
    onshore_wind: 11655.0
    offshore_wind: 114975.0
  carriers:
    - AC
    - solar
    - onshore_wind
    - offshore_wind
    - battery
    - hydrogen
    - gas
    - coal
    - oil
    - hydro
    - biomass

  carrier_technology_map:
    solar: solar-utility
    onshore_wind: onwind
    offshore_wind: offwind
    gas: CCGT
    coal: coal
    oil: oil
    hydro: hydro
    biomass: biomass